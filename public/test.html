<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Test — AI Response</title>

  <!-- KaTeX -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js"
    onload="window._katexReady = true; renderQuestions()"></script>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700;800;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --font-sans: 'Space Grotesk', Arial, sans-serif;
      --font-mono: 'Space Mono', monospace;
      --shadow-brutal: 4px 4px 0px 0px #000;
      --shadow-brutal-sm: 2px 2px 0px 0px #000;
      --shadow-brutal-lg: 6px 6px 0px 0px #000;
    }

    body {
      font-family: var(--font-sans);
      background: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ─── HEADER ─────────────────────────────── */
    header {
      background: #fde047;
      border-bottom: 2px solid #000;
      padding: 12px 20px;
      display: flex;
      align-items: center;
      gap: 16px;
      flex-shrink: 0;
    }

    header h1 {
      font-size: 1.35rem;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: -0.02em;
    }

    .header-badge {
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      background: #000;
      color: #fde047;
      padding: 2px 8px;
      letter-spacing: 0.08em;
    }

    .header-btns {
      margin-left: auto;
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .btn {
      font-family: var(--font-sans);
      font-weight: 700;
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      border: 2px solid #000;
      padding: 6px 16px;
      cursor: pointer;
      box-shadow: var(--shadow-brutal-sm);
      background: #fff;
      text-decoration: none;
      color: #000;
      display: inline-block;
    }

    .btn:active {
      transform: translate(2px, 2px);
      box-shadow: none;
    }

    .btn-back { background: #fff; }
    .btn-back:hover { background: #f0f0f0; }

    /* ─── MAIN CONTENT ───────────────────────── */
    main {
      flex: 1;
      padding: 32px 40px;
      max-width: 860px;
      width: 100%;
      margin: 0 auto;
    }

    /* ─── SECTION LABEL ─────────────────────── */
    .section-label {
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: #666;
      margin-bottom: 12px;
    }

    /* ─── RESPONSE WRAPPER ───────────────────── */
    .response-block {
      border: 2px solid #000;
      box-shadow: var(--shadow-brutal-lg);
      margin-bottom: 32px;
    }

    .response-header {
      background: #000;
      color: #fde047;
      padding: 10px 18px;
      font-size: 0.78rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      font-family: var(--font-mono);
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .response-header .dot {
      width: 8px;
      height: 8px;
      background: #4ade80;
      border: 1.5px solid #fff;
      display: inline-block;
    }

    .response-meta {
      background: #f5f5f5;
      border-bottom: 2px solid #000;
      padding: 8px 18px;
      font-size: 0.72rem;
      font-family: var(--font-mono);
      color: #444;
      display: flex;
      gap: 20px;
    }

    /* ─── QUESTION LIST ──────────────────────── */
    .question-list {
      padding: 0;
    }

    .question-card {
      display: flex;
      align-items: flex-start;
      gap: 0;
      border-bottom: 2px solid #000;
    }

    .question-card:last-child {
      border-bottom: none;
    }

    .q-num {
      flex-shrink: 0;
      width: 52px;
      background: #fde047;
      border-right: 2px solid #000;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1rem;
      font-weight: 900;
      font-family: var(--font-mono);
      padding: 20px 0;
      align-self: stretch;
    }

    .q-body {
      flex: 1;
      padding: 18px 22px;
      font-size: 1rem;
      line-height: 1.65;
      color: #111;
    }

    .q-body .katex-display {
      margin: 0.6rem 0;
      overflow-x: auto;
    }

    /* ─── STATS BAR ──────────────────────────── */
    .stats-bar {
      border: 2px solid #000;
      box-shadow: var(--shadow-brutal-sm);
      display: flex;
      overflow: hidden;
      margin-bottom: 24px;
    }

    .stat-cell {
      flex: 1;
      padding: 12px 16px;
      border-right: 2px solid #000;
    }

    .stat-cell:last-child { border-right: none; }

    .stat-label {
      font-size: 0.65rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #666;
      margin-bottom: 2px;
    }

    .stat-value {
      font-size: 1.4rem;
      font-weight: 900;
      font-family: var(--font-mono);
    }
  </style>
</head>
<body>

  <header>
    <h1>Test Mode</h1>
    <span class="header-badge">AI Response</span>
    <div class="header-btns">
      <a href="/" class="btn btn-back">← Back</a>
    </div>
  </header>

  <main>

    <div class="section-label">Response</div>

    <div class="stats-bar">
      <div class="stat-cell">
        <div class="stat-label">Questions</div>
        <div class="stat-value" id="stat-count">—</div>
      </div>
      <div class="stat-cell">
        <div class="stat-label">Mode</div>
        <div class="stat-value" style="font-size:1rem;padding-top:4px">Test</div>
      </div>
      <div class="stat-cell">
        <div class="stat-label">Status</div>
        <div class="stat-value" style="font-size:1rem;padding-top:4px;color:#16a34a">Ready</div>
      </div>
    </div>

    <div class="response-block">
      <div class="response-header">
        <span class="dot"></span>
        AI Response
        <span style="margin-left:auto;font-weight:400;opacity:0.7" id="response-timestamp"></span>
      </div>
      <div class="response-meta" id="response-meta"></div>
      <div class="question-list" id="question-list"></div>
    </div>

  </main>

  <script>
    const TEST_RESPONSE = {
      "questions": [
        { "id": 1, "question": "Define a convex set and give a geometric example." },
        { "id": 2, "question": "Prove that the intersection of two convex sets is convex." },
        { "id": 3, "question": "Let $f: \\mathbb{R}^n \\to \\mathbb{R}$ be twice differentiable. State the second-order condition that characterises $f$ as convex, and explain the role of the Hessian $\\nabla^2 f(x)$." },
        { "id": 4, "question": "Show that the function $f(x) = x^2$ is convex using the definition: for all $x, y$ and $\\lambda \\in [0,1]$, $f(\\lambda x + (1-\\lambda)y) \\leq \\lambda f(x) + (1-\\lambda)f(y)$." },
        { "id": 5, "question": "Describe the epigraph of a function and explain its relationship to convexity." },
        { "id": 6, "question": "What is a convex combination? How does it generalise the midpoint condition in the definition of convexity?" },
        { "id": 7, "question": "Give an example of a function that is quasiconvex but not convex, and justify your claim." }
      ]
    };

    function renderQuestions() {
      const list = document.getElementById('question-list');
      const statCount = document.getElementById('stat-count');
      const responseMeta = document.getElementById('response-meta');
      const responseTimestamp = document.getElementById('response-timestamp');

      const { questions } = TEST_RESPONSE;

      statCount.textContent = questions.length;
      responseTimestamp.textContent = new Date().toLocaleTimeString();
      responseMeta.innerHTML = `<span>questions: ${questions.length}</span><span>type: structured_json</span>`;

      list.innerHTML = questions.map(q => `
        <div class="question-card">
          <div class="q-num">${q.id}</div>
          <div class="q-body" id="q-body-${q.id}">${q.question}</div>
        </div>
      `).join('');

      if (window._katexReady) {
        questions.forEach(q => {
          const el = document.getElementById(`q-body-${q.id}`);
          if (el) {
            renderMathInElement(el, {
              delimiters: [
                { left: '$$', right: '$$', display: true },
                { left: '$', right: '$', display: false },
                { left: '\\(', right: '\\)', display: false },
                { left: '\\[', right: '\\]', display: true }
              ],
              throwOnError: false
            });
          }
        });
      }
    }

    document.addEventListener('DOMContentLoaded', () => {
      renderQuestions();
      setTimeout(() => { if (!window._katexReady) {} else renderQuestions(); }, 800);
    });
  </script>

</body>
</html>
