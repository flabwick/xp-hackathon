<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>XP Study</title>
  <link rel="stylesheet" href="home.css">
</head>
<body>

<header id="nav-bar">
  <h1>XP Study</h1>
  <nav class="nav-links">
    <a href="/mapping" class="nav-btn">Mapping</a>
  </nav>
</header>

<div id="controls-bar">
  <div class="control-group">
    <label class="control-label">Domain</label>
    <select id="domain-select">
      <option value="">-- Select --</option>
    </select>
  </div>

  <div class="control-group">
    <label class="control-label">Mode</label>
    <select id="prompt-mode">
      <option value="test">Test</option>
      <option value="study">Study</option>
      <option value="revise" disabled>Revise (Disabled)</option>
    </select>
  </div>

  <div class="control-group">
    <label class="control-label">View</label>
    <div class="toggle-row">
      <button id="mode-toggle" class="btn toggle active" data-target="select">Select</button>
      <button id="mode-priority" class="btn toggle" data-target="priority">Priority</button>
    </div>
  </div>

  <div id="priority-controls" class="control-group hidden">
    <label class="control-label">Units: <span id="priority-val">5</span></label>
    <input type="range" id="priority-count" min="1" max="50" value="5">
  </div>

  <button id="copy-prompt" class="btn primary">Copy Prompt</button>
</div>

<main id="content-area">
  <section id="tree-container">
    <div id="tree-loader" class="placeholder">Select a domain to load units.</div>
  </section>

  <section id="priority-list" class="hidden">
    <div id="priority-loader" class="placeholder">Priority calculation requires a loaded domain.</div>
  </section>
</main>

<div id="toast" class="toast"></div>

<script src="routes.js"></script>
<script src="app.js?v=3"></script>
</body>
</html>
