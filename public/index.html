<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StudyXP — Study Menu</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700;800;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="index.css">
</head>
<body>

<header id="study-menu">
  <div class="header-top">
    <a href="/" class="back-link" title="Back to course picker">←</a>
    <h1>STUDYXP</h1>
    <span class="header-badge" id="domain-badge">—</span>
    <button id="open-keys-btn" class="back-link" title="Set API keys" style="margin-left:auto;">🔑</button>
  </div>

  <div class="controls">
    <div class="control-block">
      <label class="control-label">Domain</label>
      <select id="domain-select">
        <option value="">— Select —</option>
      </select>
    </div>

    <div class="control-block">
      <label class="control-label">Mode</label>
      <select id="prompt-mode">
        <option value="test">Test</option>
        <option value="study">Study</option>
        <option value="revise" disabled>Revise (Disabled)</option>
      </select>
    </div>

    <div class="control-block">
      <label class="control-label">Selection</label>
      <div class="toggle-pair">
        <button id="mode-toggle" class="btn toggle active" data-target="select">Select</button>
        <button id="mode-priority" class="btn toggle" data-target="priority">Priority</button>
      </div>
    </div>

    <div id="priority-controls" class="control-block hidden">
      <label class="control-label">Units to Study: <span id="priority-val">5</span></label>
      <input type="range" id="priority-count" min="1" max="50" value="5">
    </div>

    <div class="control-spacer"></div>

    <button id="test-btn" class="btn btn-test">▶ TEST</button>
  </div>
</header>

<main id="content-area">
  <div class="section-bar">
    <h2 class="section-title">Topics</h2>
    <span class="section-hint">Pick units to test, or switch to Priority mode.</span>
  </div>

  <section id="tree-container">
    <div id="tree-loader" class="placeholder">Select a domain to load units.</div>
  </section>

  <section id="priority-list" class="hidden">
    <div id="priority-loader" class="placeholder">Priority calculation requires loaded domain & XP.</div>
  </section>
</main>

<div id="toast" class="toast"></div>

<dialog id="xp-modal">
  <div class="modal-header">
    <h2>📊 XP Update Results</h2>
    <button class="btn close" id="close-modal">✖</button>
  </div>
  <div id="modal-tabs">
    <div class="tab-bar">
      <button class="tab-btn active" data-tab="latest">Latest</button>
      <button class="tab-btn" data-tab="history">History</button>
    </div>
    <div id="tab-latest" class="tab-panel active">
      <div id="modal-stats"></div>
    </div>
    <div id="tab-history" class="tab-panel">
      <div class="history-toolbar">
        <strong>Injection History</strong>
        <button id="clear-all-history" class="btn-undo">🗑 CLEAR ALL</button>
      </div>
      <div id="modal-history"></div>
    </div>
  </div>
</dialog>

<dialog id="keys-modal">
  <div class="modal-header">
    <h2>🔑 API Keys</h2>
    <button class="btn close" id="keys-modal-close">✖</button>
  </div>
  <div style="padding: 18px 22px; display:flex; flex-direction:column; gap:14px;">
    <p style="font-family: 'Space Mono', monospace; font-size: 0.75rem; color: #444;">
      Stored in your browser only. Sent per-request to the server.
    </p>
    <div>
      <label style="display:block; font-family:'Space Mono',monospace; font-size:0.7rem; font-weight:700; text-transform:uppercase; letter-spacing:0.08em; margin-bottom:6px;">Groq API Key</label>
      <input id="study-groq-key" type="password" autocomplete="off" placeholder="gsk_..."
        style="width:100%; border:2px solid #000; padding:10px 12px; font-family:'Space Mono',monospace; font-size:0.85rem; background:#f5f5f5;">
    </div>
    <div>
      <label style="display:block; font-family:'Space Mono',monospace; font-size:0.7rem; font-weight:700; text-transform:uppercase; letter-spacing:0.08em; margin-bottom:6px;">OpenAI API Key (for Add Course)</label>
      <input id="study-openai-key" type="password" autocomplete="off" placeholder="sk-..."
        style="width:100%; border:2px solid #000; padding:10px 12px; font-family:'Space Mono',monospace; font-size:0.85rem; background:#f5f5f5;">
    </div>
    <button id="study-save-keys" class="btn"
      style="background:#4ade80; border:2px solid #000; padding:10px 20px; font-weight:900; text-transform:uppercase;">
      Save
    </button>
  </div>
</dialog>

<script>
  // BYOK: gate the TEST button on a Groq key being available
  // (either user-supplied via localStorage, or server-side env in local dev).
  (function() {
    const keysModal  = document.getElementById('keys-modal');
    const groqInput  = document.getElementById('study-groq-key');
    const oaInput    = document.getElementById('study-openai-key');
    const testBtn    = document.getElementById('test-btn');
    let serverHasGroqKey = false;

    fetch('/api/config').then(r => r.json()).then(cfg => {
      serverHasGroqKey = !!cfg.hasGroqKey;
      refreshTestGate();
    }).catch(() => refreshTestGate());

    function userHasGroqKey() {
      return !!localStorage.getItem('studyxp.groq_api_key');
    }
    function refreshTestGate() {
      if (!testBtn) return;
      const hasKey = userHasGroqKey() || serverHasGroqKey;
      if (hasKey) {
        testBtn.disabled = false;
        testBtn.title = 'Generate a test on the selected units';
        testBtn.textContent = '▶ TEST';
      } else {
        testBtn.disabled = true;
        testBtn.title = 'Add your Groq API key first (🔑 in the header)';
        testBtn.textContent = '🔒 ADD KEY TO TEST';
      }
    }

    document.getElementById('open-keys-btn')?.addEventListener('click', () => {
      groqInput.value = localStorage.getItem('studyxp.groq_api_key')   || '';
      oaInput.value   = localStorage.getItem('studyxp.openai_api_key') || '';
      keysModal.showModal();
    });
    document.getElementById('keys-modal-close')?.addEventListener('click', () => {
      keysModal.close();
      refreshTestGate();
    });
    document.getElementById('study-save-keys')?.addEventListener('click', () => {
      const g = groqInput.value.trim(), o = oaInput.value.trim();
      if (g) localStorage.setItem('studyxp.groq_api_key', g);   else localStorage.removeItem('studyxp.groq_api_key');
      if (o) localStorage.setItem('studyxp.openai_api_key', o); else localStorage.removeItem('studyxp.openai_api_key');
      keysModal.close();
      refreshTestGate();
    });

    // Intercept TEST clicks while gated (the disabled prop blocks the click,
    // but if anything dynamically re-enables it we still want the modal to pop).
    testBtn?.addEventListener('click', (e) => {
      if (!userHasGroqKey() && !serverHasGroqKey) {
        e.preventDefault();
        e.stopImmediatePropagation();
        keysModal.showModal();
      }
    }, true); // capture phase so this runs before app.js's own handler
  })();
</script>

<script src="app.js?v=3"></script>
</body>
</html>
