<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Courses</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header id="study-menu">
  <h1>📚 COURSES</h1>
  <div class="controls">
    <button id="create-course" class="btn primary">+ CREATE COURSE</button>
  </div>
</header>

<main id="content-area">
  <section id="courses-container">
    <div class="injection-grid" id="courses-grid">
      <div class="placeholder">Loading courses…</div>
    </div>
  </section>
</main>

<dialog id="create-modal">
  <div class="modal-header">
    <h2>📚 New Course</h2>
    <button class="btn close" id="close-create">✖</button>
  </div>
  <form id="create-form">
    <label for="course-name" style="display:block;font-weight:700;margin-bottom:0.5rem;text-transform:uppercase;font-size:0.85rem">Course Name</label>
    <input type="text" id="course-name" required maxlength="80" placeholder="e.g. Calculus" style="width:100%;padding:0.6rem;font-size:1rem;font-family:inherit">
    <div style="margin-top:1.2rem;display:flex;gap:0.8rem;justify-content:flex-end">
      <button type="button" class="btn" id="cancel-create">CANCEL</button>
      <button type="submit" class="btn primary">CREATE</button>
    </div>
  </form>
</dialog>

<div id="toast" class="toast"></div>

<script src="homepage.js?v=1"></script>
</body>
</html>
