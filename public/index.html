<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>XP Study</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="home.css">
  <link rel="stylesheet" href="index.css">
</head>
<body>

<nav id="nav-bar">
  <h1>XP STUDY</h1>
  <div class="nav-links">
    <button id="create-course" class="nav-btn">+ NEW COURSE</button>
  </div>
</nav>

<div id="content-area">
  <div style="display:flex;align-items:baseline;justify-content:space-between;margin-bottom:1.5rem;flex-wrap:wrap;gap:0.5rem">
    <h2 style="font-size:1.15rem;font-weight:900;text-transform:uppercase;letter-spacing:2px;color:var(--text)">My Courses</h2>
    <span id="course-count" style="font-size:0.7rem;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:2px"></span>
  </div>

  <div class="injection-grid" id="courses-grid">
    <div class="placeholder">Loading courses…</div>
  </div>
</div>

<dialog id="create-modal">
  <div class="modal-header">
    <h2>New Course</h2>
    <button class="btn" id="close-create" style="padding:0.3rem 0.7rem">✖</button>
  </div>
  <form id="create-form">
    <label for="course-name" style="display:block;font-weight:700;margin-bottom:0.5rem;text-transform:uppercase;font-size:0.8rem;letter-spacing:1px">Course Name</label>
    <input type="text" id="course-name" required maxlength="80" placeholder="e.g. Calculus" style="width:100%;padding:0.6rem;font-size:1rem;font-family:inherit;border:2px solid var(--border);background:var(--bg);outline:none;box-shadow:var(--shadow-sm)">
    <p style="font-size:0.75rem;color:var(--muted);margin-top:0.4rem">A domain slug will be auto-generated from the name.</p>
    <div style="margin-top:1.2rem;display:flex;gap:0.8rem;justify-content:flex-end">
      <button type="button" class="btn" id="cancel-create">CANCEL</button>
      <button type="submit" class="btn primary">CREATE</button>
    </div>
  </form>

  <!-- Step 2: upload textbook (shown after course is created) -->
  <div id="cc-upload" hidden>
    <p style="margin:0 0 0.4rem;font-weight:700;text-transform:uppercase;font-size:0.85rem;letter-spacing:1px">Course Created!</p>
    <p style="margin:0 0 1.2rem;font-size:0.85rem;color:var(--muted)">Upload a PDF textbook to populate units (optional).</p>
    <div id="cc-choose">
      <div style="display:flex;gap:0.8rem">
        <button id="cc-pdf-btn" class="btn primary">📄 UPLOAD PDF</button>
        <button id="cc-skip-btn" class="btn">SKIP →</button>
      </div>
    </div>
    <div id="cc-progress" hidden>
      <p id="cc-progress-text" style="margin:0;font-weight:600"></p>
    </div>
    <div id="cc-result" hidden>
      <div id="cc-result-content"></div>
      <button id="cc-done-btn" class="btn primary" style="margin-top:1rem">DONE →</button>
    </div>
  </div>
  <input id="cc-pdf-input" type="file" accept="application/pdf" hidden>
</dialog>

<div id="toast" class="toast"></div>

<script src="homepage.js?v=2"></script>
</body>
</html>
