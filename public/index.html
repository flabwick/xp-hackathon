<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>XP Study & Injection</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700;800;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="index.css">
</head>
<body>

<header id="study-menu">
  <div class="header-top">
    <a href="/" class="back-link" title="Back to domain picker">←</a>
    <h1>STUDY MENU</h1>
    <span class="header-badge" id="domain-badge">—</span>
  </div>

  <div class="controls">
    <div class="control-block">
      <label class="control-label">Domain</label>
      <select id="domain-select">
        <option value="">— Select —</option>
      </select>
    </div>

    <div class="control-block">
      <label class="control-label">Mode</label>
      <select id="prompt-mode">
        <option value="test">Test</option>
        <option value="study">Study</option>
        <option value="revise" disabled>Revise (Disabled)</option>
      </select>
    </div>

    <div class="control-block">
      <label class="control-label">Selection</label>
      <div class="toggle-pair">
        <button id="mode-toggle" class="btn toggle active" data-target="select">Select</button>
        <button id="mode-priority" class="btn toggle" data-target="priority">Priority</button>
      </div>
    </div>

    <div id="priority-controls" class="control-block hidden">
      <label class="control-label">Units to Study: <span id="priority-val">5</span></label>
      <input type="range" id="priority-count" min="1" max="50" value="5">
    </div>

    <div class="control-spacer"></div>

    <button id="test-btn" class="btn btn-test">▶ TEST</button>
  </div>
</header>

<main id="content-area">
  <div class="section-bar">
    <h2 class="section-title">Topics</h2>
    <span class="section-hint">Pick units to test, or switch to Priority mode.</span>
  </div>

  <section id="tree-container">
    <div id="tree-loader" class="placeholder">Select a domain to load units.</div>
  </section>

  <section id="priority-list" class="hidden">
    <div id="priority-loader" class="placeholder">Priority calculation requires loaded domain & XP.</div>
  </section>
</main>

<div id="toast" class="toast"></div>

<dialog id="xp-modal">
  <div class="modal-header">
    <h2>📊 XP Update Results</h2>
    <button class="btn close" id="close-modal">✖</button>
  </div>
  <div id="modal-tabs">
    <div class="tab-bar">
      <button class="tab-btn active" data-tab="latest">Latest</button>
      <button class="tab-btn" data-tab="history">History</button>
    </div>
    <div id="tab-latest" class="tab-panel active">
      <div id="modal-stats"></div>
    </div>
    <div id="tab-history" class="tab-panel">
      <div class="history-toolbar">
        <strong>Injection History</strong>
        <button id="clear-all-history" class="btn-undo">🗑 CLEAR ALL</button>
      </div>
      <div id="modal-history"></div>
    </div>
  </div>
</dialog>

<script src="app.js?v=3"></script>
</body>
</html>
