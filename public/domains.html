<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>XP Study — Select Domain</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700;800;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --font-sans: 'Space Grotesk', Arial, sans-serif;
      --font-mono: 'Space Mono', monospace;
      --shadow: 4px 4px 0px 0px #000;
      --shadow-sm: 2px 2px 0px 0px #000;
      --shadow-lg: 6px 6px 0px 0px #000;
    }

    body {
      font-family: var(--font-sans);
      background: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: #fde047;
      border-bottom: 3px solid #000;
      padding: 20px 40px;
      display: flex;
      align-items: center;
      gap: 16px;
    }

    header h1 {
      font-size: 1.6rem;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: -0.03em;
    }

    .header-sub {
      font-family: var(--font-mono);
      font-size: 0.72rem;
      color: #555;
      margin-top: 2px;
    }

    main {
      flex: 1;
      padding: 48px 40px;
      max-width: 960px;
      width: 100%;
      margin: 0 auto;
    }

    .page-label {
      font-size: 0.65rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      color: #888;
      font-family: var(--font-mono);
      margin-bottom: 24px;
    }

    .domain-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 24px;
    }

    .domain-card {
      border: 2px solid #000;
      box-shadow: var(--shadow-lg);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      text-decoration: none;
      color: #000;
      transition: transform 0.08s, box-shadow 0.08s;
    }

    .domain-card:hover {
      transform: translate(-2px, -2px);
      box-shadow: 8px 8px 0px 0px #000;
    }

    .domain-card:active {
      transform: translate(4px, 4px);
      box-shadow: none;
    }

    .card-top {
      background: #000;
      color: #fde047;
      padding: 10px 18px;
      font-family: var(--font-mono);
      font-size: 0.68rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    .card-body {
      padding: 22px 20px 20px;
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .card-name {
      font-size: 1.3rem;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: -0.02em;
      line-height: 1.15;
    }

    .card-meta {
      font-family: var(--font-mono);
      font-size: 0.72rem;
      color: #666;
      display: flex;
      gap: 16px;
    }

    .card-action {
      margin-top: auto;
      background: #4ade80;
      border: 2px solid #000;
      box-shadow: var(--shadow-sm);
      padding: 12px 20px;
      font-family: var(--font-sans);
      font-weight: 900;
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      text-align: center;
      cursor: pointer;
    }

    /* Loading skeleton */
    .skeleton-card {
      border: 2px solid #000;
      box-shadow: var(--shadow-lg);
      height: 160px;
      background: repeating-linear-gradient(
        90deg, #f5f5f5 0px, #ebebeb 20px, #f5f5f5 40px
      );
      animation: shimmer 1.2s infinite;
      background-size: 400px 100%;
    }

    @keyframes shimmer {
      0% { background-position: -400px 0; }
      100% { background-position: 400px 0; }
    }

    .error-block {
      border: 2px solid #000;
      box-shadow: var(--shadow-lg);
      background: #fca5a5;
      padding: 24px 28px;
    }

    .error-block h3 { font-weight: 900; text-transform: uppercase; margin-bottom: 8px; }
    .error-block p { font-family: var(--font-mono); font-size: 0.82rem; }

    .empty-block {
      border: 2px solid #000;
      box-shadow: var(--shadow-lg);
      padding: 48px 32px;
      text-align: center;
    }

    .empty-block h3 { font-size: 1.2rem; font-weight: 900; text-transform: uppercase; margin-bottom: 10px; }
    .empty-block p { font-family: var(--font-mono); font-size: 0.82rem; color: #666; }

    /* Domain color accents */
    .delete-btn {
      background: transparent;
      border: none;
      color: #fde047;
      font-size: 0.85rem;
      font-weight: 900;
      cursor: pointer;
      padding: 2px 6px;
      line-height: 1;
      opacity: 0.7;
    }
    .delete-btn:hover { opacity: 1; color: #fff; }

    .accent-0 { border-top: 4px solid #c084fc; }
    .accent-1 { border-top: 4px solid #818cf8; }
    .accent-2 { border-top: 4px solid #4ade80; }
    .accent-3 { border-top: 4px solid #fb923c; }
    .accent-4 { border-top: 4px solid #f87171; }
    .accent-5 { border-top: 4px solid #38bdf8; }
  </style>
</head>
<body>

  <header>
    <div>
      <h1>XP Study</h1>
      <div class="header-sub">Adaptive Learning System</div>
    </div>
  </header>

  <main>
    <div class="page-label">Select a Domain to Begin</div>
    <div class="domain-grid" id="domain-grid">
      <div class="skeleton-card"></div>
      <div class="skeleton-card"></div>
    </div>
  </main>

  <script>
    const grid = document.getElementById('domain-grid');
    const ACCENTS = ['accent-0','accent-1','accent-2','accent-3','accent-4','accent-5'];

    async function loadDomains() {
      try {
        const domains = await fetch('/api/domains').then(r => r.json());

        if (!domains || domains.length === 0) {
          grid.innerHTML = `
            <div class="empty-block">
              <h3>No Domains Found</h3>
              <p>Add a domain JSON file to data/units/ to get started.</p>
            </div>
          `;
          return;
        }

        // Fetch unit counts for each domain in parallel
        const details = await Promise.all(domains.map(async (d, i) => {
          try {
            const data = await fetch(`/api/units/${d}`).then(r => r.json());
            let unitCount = 0;
            for (const bt of (data.tree || [])) {
              for (const cl of (bt.clusters || [])) {
                unitCount += (cl.units || []).length;
              }
            }
            const clusterCount = (data.tree || []).reduce((s, bt) => s + bt.clusters.length, 0);
            return { name: d, unitCount, clusterCount, accent: ACCENTS[i % ACCENTS.length] };
          } catch (_) {
            return { name: d, unitCount: '?', clusterCount: '?', accent: ACCENTS[i % ACCENTS.length] };
          }
        }));

        grid.innerHTML = details.map(d => `
          <a class="domain-card ${d.accent}" href="/unit/${encodeURIComponent(d.name)}">
            <div class="card-top" style="display:flex;justify-content:space-between;align-items:center">
              <span>Domain</span>
              <button class="delete-btn" data-domain="${escapeHtml(d.name)}" title="Delete domain">✕</button>
            </div>
            <div class="card-body">
              <div class="card-name">${escapeHtml(d.name)}</div>
              <div class="card-meta">
                <span>${d.unitCount} units</span>
                <span>${d.clusterCount} clusters</span>
              </div>
              <div class="card-action">Open →</div>
            </div>
          </a>
        `).join('');

        grid.querySelectorAll('.delete-btn').forEach(btn => {
          btn.addEventListener('click', async (e) => {
            e.preventDefault();
            e.stopPropagation();
            const domain = btn.dataset.domain;
            if (!confirm(`Delete "${domain}"? This cannot be undone.`)) return;
            try {
              const r = await fetch(`/api/domains/${encodeURIComponent(domain)}`, { method: 'DELETE' });
              if (!r.ok) throw new Error((await r.json()).error);
              loadDomains();
            } catch (err) {
              alert('Delete failed: ' + err.message);
            }
          });
        });

      } catch (err) {
        grid.innerHTML = `
          <div class="error-block">
            <h3>Failed to Load</h3>
            <p>${escapeHtml(err.message)}</p>
          </div>
        `;
      }
    }

    function escapeHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;').replace(/</g, '&lt;')
        .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    loadDomains();
  </script>

</body>
</html>
