<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StudyXP — Unit Detail</title>
  <link rel="stylesheet" href="unit.css">
</head>
<body>

<header id="nav-bar">
  <div class="nav-left">
    <a id="back-btn" href="/" class="nav-btn back">← Home</a>
    <h1>Unit Detail</h1>
  </div>
  <nav class="nav-links">
    <a href="/mapping" class="nav-btn">Mapping</a>
  </nav>
</header>

<main id="unit-main">
  <div id="unit-loader" class="placeholder">Loading unit...</div>

  <div id="unit-content" class="hidden">

    <div id="unit-hero">
      <div class="unit-id-badge" id="unit-id-display"></div>
      <h2 id="unit-name-display"></h2>
      <div class="unit-meta-row">
        <span id="unit-type-badge" class="type-badge"></span>
        <span id="unit-location" class="unit-location"></span>
      </div>
    </div>

    <div id="unit-xp-section" class="section-card">
      <div class="section-title">XP Progress</div>
      <div class="xp-stats">
        <div class="xp-stat-item">
          <div class="stat-label">Band</div>
          <div id="xp-band" class="stat-value band-display band-I">I</div>
        </div>
        <div class="xp-stat-item">
          <div class="stat-label">Total XP</div>
          <div id="xp-total" class="stat-value">0</div>
        </div>
        <div class="xp-stat-item">
          <div class="stat-label">Sessions</div>
          <div id="xp-sessions" class="stat-value">0</div>
        </div>
      </div>
      <div class="xp-bar-container">
        <div id="xp-bar" class="xp-bar-fill band-fill-I"></div>
      </div>
      <div class="xp-bar-labels">
        <span>0</span>
        <span>II: 150</span>
        <span>III: 600</span>
        <span>IV: 1500</span>
        <span>V: 2400</span>
      </div>
    </div>

    <div id="unit-scope-section" class="section-card hidden">
      <div class="section-title">Scope Notes</div>
      <div id="unit-scope-text" class="scope-text"></div>
    </div>

    <div id="prereqs-section" class="section-card hidden">
      <div class="section-title">Prerequisites</div>
      <div id="prereqs-list"></div>
    </div>

    <div id="dependents-section" class="section-card hidden">
      <div class="section-title">Dependents</div>
      <div id="dependents-list"></div>
    </div>

    <div id="cluster-section" class="section-card hidden">
      <div class="section-title">Cluster Units</div>
      <div id="cluster-units-list"></div>
    </div>

  </div>
</main>

<script src="routes.js"></script>
<script src="unit.js"></script>
</body>
</html>
