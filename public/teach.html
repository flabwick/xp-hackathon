<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StudyXP — Teach Mode</title>

  <!-- KaTeX -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js"
    onload="window._katexReady = true; renderPendingMath()"></script>

  <!-- marked -->
  <script src="https://cdn.jsdelivr.net/npm/marked@13.0.3/marked.min.js"></script>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700;800;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --font-sans: 'Space Grotesk', Arial, sans-serif;
      --font-mono: 'Space Mono', monospace;
      --shadow-brutal: 4px 4px 0px 0px #000;
      --shadow-brutal-sm: 2px 2px 0px 0px #000;
      --shadow-brutal-lg: 6px 6px 0px 0px #000;
    }

    body {
      font-family: var(--font-sans);
      background: #fff;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ─── HEADER ─────────────────────────────── */
    header {
      background: #fde047;
      border-bottom: 2px solid #000;
      padding: 12px 20px;
      display: flex;
      align-items: center;
      gap: 16px;
      flex-shrink: 0;
    }

    header h1 {
      font-size: 1.35rem;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: -0.02em;
    }

    .header-badge {
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      background: #000;
      color: #fde047;
      padding: 2px 8px;
      letter-spacing: 0.08em;
    }

    .header-btns {
      margin-left: auto;
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .btn {
      font-family: var(--font-sans);
      font-weight: 700;
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      border: 2px solid #000;
      padding: 6px 16px;
      cursor: pointer;
      box-shadow: var(--shadow-brutal-sm);
      background: #fff;
      text-decoration: none;
      color: #000;
      display: inline-block;
    }

    .btn:active {
      transform: translate(2px, 2px);
      box-shadow: none;
    }

    .btn-send {
      background: #000;
      color: #fde047;
      border: 2px solid #000;
      box-shadow: var(--shadow-brutal-sm);
      padding: 0 20px;
      height: 100%;
      font-size: 0.85rem;
      flex-shrink: 0;
    }

    .btn-send:hover { background: #222; }
    .btn-send:active { transform: translate(2px, 2px); box-shadow: none; }

    /* ─── CHAT LAYOUT ────────────────────────── */
    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ─── MESSAGE FEED ───────────────────────── */
    #chat-feed {
      flex: 1;
      overflow-y: auto;
      padding: 28px 5vw;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    #chat-feed::-webkit-scrollbar { width: 8px; }
    #chat-feed::-webkit-scrollbar-track { background: #f0f0f0; }
    #chat-feed::-webkit-scrollbar-thumb { background: #000; border: 1px solid #000; }

    /* ─── MESSAGE BUBBLE ─────────────────────── */
    .msg {
      display: flex;
      flex-direction: column;
      width: 100%;
    }

    .msg-label {
      font-size: 0.65rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: #666;
      margin-bottom: 5px;
      font-family: var(--font-mono);
    }

    .msg-bubble {
      border: 2px solid #000;
      padding: 16px 20px;
      font-size: 0.95rem;
      line-height: 1.7;
      color: #111;
      width: 100%;
    }

    .msg-user .msg-bubble {
      background: #fde047;
      box-shadow: var(--shadow-brutal-sm);
      font-weight: 500;
    }

    .msg-ai .msg-bubble {
      background: #f5f5f5;
      box-shadow: var(--shadow-brutal);
    }

    .msg-ai .msg-bubble.thinking {
      background: #ebebeb;
    }

    /* ─── AI BUBBLE MARKDOWN STYLES ─────────── */
    .msg-bubble h1 {
      font-size: 1.5rem;
      font-weight: 900;
      border-bottom: 3px solid #000;
      padding-bottom: 6px;
      margin-bottom: 1rem;
      margin-top: 0.25rem;
      line-height: 1.2;
    }

    .msg-bubble h2 {
      font-size: 1.2rem;
      font-weight: 800;
      border-bottom: 2px solid #000;
      padding-bottom: 4px;
      margin-bottom: 0.75rem;
      margin-top: 1.25rem;
    }

    .msg-bubble h3 {
      font-size: 1rem;
      font-weight: 700;
      margin-bottom: 0.4rem;
      margin-top: 1rem;
    }

    .msg-bubble h4, .msg-bubble h5, .msg-bubble h6 {
      font-weight: 700;
      margin-bottom: 0.35rem;
      margin-top: 0.75rem;
    }

    .msg-bubble p { margin-bottom: 0.75rem; }
    .msg-bubble p:last-child { margin-bottom: 0; }

    .msg-bubble strong { font-weight: 800; }
    .msg-bubble em { font-style: italic; }

    .msg-bubble a {
      color: #000;
      font-weight: 700;
      text-decoration: underline;
      text-decoration-thickness: 2px;
      text-underline-offset: 2px;
    }

    .msg-bubble code {
      font-family: var(--font-mono);
      font-size: 0.82em;
      background: #f0f0f0;
      border: 1.5px solid #000;
      padding: 0.1em 0.4em;
    }

    .msg-ai .msg-bubble code {
      background: #f0f0f0;
    }

    .msg-bubble pre {
      background: #fff;
      color: #111;
      border: 2px solid #000;
      box-shadow: var(--shadow-brutal-sm);
      padding: 0.9rem 1.1rem;
      overflow-x: auto;
      margin-bottom: 0.9rem;
      margin-top: 0.5rem;
    }

    .msg-bubble pre code {
      background: none;
      border: none;
      padding: 0;
      color: #111;
      font-size: 0.82rem;
    }

    .msg-bubble .math-block {
      margin: 0.75rem 0;
      overflow-x: auto;
    }

    .msg-bubble ul {
      list-style: none;
      padding-left: 1.1rem;
      margin-bottom: 0.75rem;
    }

    .msg-bubble ul li::before {
      content: "▸ ";
      font-weight: 700;
    }

    .msg-bubble ol {
      list-style: none;
      padding-left: 1.5rem;
      margin-bottom: 0.75rem;
      counter-reset: ol-counter;
    }

    .msg-bubble ol li { counter-increment: ol-counter; }

    .msg-bubble ol li::before {
      content: counter(ol-counter) ". ";
      font-weight: 700;
    }

    .msg-bubble li { margin-bottom: 0.3rem; }

    .msg-bubble blockquote {
      border-left: 4px solid #000;
      background: #fef9c3;
      padding: 0.75rem 1rem;
      margin-bottom: 0.75rem;
      box-shadow: var(--shadow-brutal-sm);
    }

    .msg-bubble hr {
      border: none;
      border-top: 3px solid #000;
      margin: 1.25rem 0;
    }

    .msg-bubble table {
      border-collapse: collapse;
      width: 100%;
      margin-bottom: 0.9rem;
      box-shadow: var(--shadow-brutal-sm);
    }

    .msg-bubble th {
      background: #000;
      color: #fff;
      padding: 7px 11px;
      text-align: left;
      font-weight: 700;
      font-size: 0.82rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .msg-bubble td {
      border: 2px solid #000;
      padding: 7px 11px;
    }

    .msg-bubble tr:nth-child(even) td { background: #f9f9f9; }

    .msg-bubble .katex-display {
      overflow-x: auto;
      padding: 0.5rem 0;
      margin: 0.5rem 0;
    }

    /* ─── INPUT BAR ──────────────────────────── */
    .input-bar {
      border-top: 2px solid #000;
      padding: 14px 5vw;
      background: #f5f5f5;
      display: flex;
      gap: 0;
      align-items: stretch;
      flex-shrink: 0;
    }

    #msg-input {
      flex: 1;
      font-family: var(--font-sans);
      font-size: 0.95rem;
      padding: 10px 14px;
      border: 2px solid #000;
      border-right: none;
      outline: none;
      background: #fff;
      resize: none;
      height: 50px;
      line-height: 1.5;
    }

    #msg-input:focus { background: #fffef0; }

    /* ─── TYPING INDICATOR ───────────────────── */
    .typing-dots {
      display: flex;
      gap: 5px;
      align-items: center;
      padding: 4px 0;
    }

    .typing-dots span {
      width: 8px;
      height: 8px;
      background: #000;
      display: inline-block;
      animation: blink 1.2s infinite;
    }

    .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes blink {
      0%, 80%, 100% { opacity: 0.15; }
      40% { opacity: 1; }
    }

    /* ─── DIVIDER ────────────────────────────── */
    .session-divider {
      display: flex;
      align-items: center;
      gap: 12px;
      color: #999;
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      font-family: var(--font-mono);
    }

    .session-divider::before,
    .session-divider::after {
      content: '';
      flex: 1;
      height: 2px;
      background: #e0e0e0;
    }
  </style>
</head>
<body>

  <header>
    <h1>Teach Mode</h1>
    <span class="header-badge">AI Tutor</span>
    <div class="header-btns">
      <a href="/" class="btn">← Back</a>
    </div>
  </header>

  <main>
    <div id="chat-feed"></div>

    <div class="input-bar">
      <textarea id="msg-input" placeholder="Ask a question or request an explanation…" rows="1"></textarea>
      <button class="btn btn-send" id="btn-send">Send</button>
    </div>
  </main>

  <script>
    // ─── STATE ───────────────────────────────────────────────────────────────────
    let domain = null;
    let unitIds = [];
    let conversationMessages = [];
    let isStreaming = false;

    const feed = document.getElementById('chat-feed');
    const input = document.getElementById('msg-input');
    const sendBtn = document.getElementById('btn-send');

    // ─── MARKDOWN / MATH ─────────────────────────────────────────────────────────
    function renderMarkdown(text) {
      const stash = [];
      const stashed = text
        .replace(/\$\$([\s\S]*?)\$\$/g, (_, m) => {
          stash.push({ display: true, src: m });
          return `MATHSTASH${stash.length - 1}X`;
        })
        .replace(/\$([^\n$]+?)\$/g, (_, m) => {
          stash.push({ display: false, src: m });
          return `MATHSTASH${stash.length - 1}X`;
        });

      let html = marked.parse(stashed);

      html = html.replace(/MATHSTASH(\d+)X/g, (_, i) => {
        const { display, src } = stash[parseInt(i)];
        return display ? `$$${src}$$` : `$${src}$`;
      });

      html = html.replace(/<p>\s*(\$\$[\s\S]*?\$\$)\s*<\/p>/g,
        '<div class="math-block">$1</div>');

      return html;
    }

    function applyMath(el) {
      if (!window._katexReady) return;
      renderMathInElement(el, {
        delimiters: [
          { left: '$$', right: '$$', display: true },
          { left: '$', right: '$', display: false },
          { left: '\\(', right: '\\)', display: false },
          { left: '\\[', right: '\\]', display: true }
        ],
        throwOnError: false
      });
    }

    const pendingMathEls = [];

    function renderPendingMath() {
      pendingMathEls.forEach(el => applyMath(el));
      pendingMathEls.length = 0;
    }

    function escapeHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;').replace(/</g, '&lt;')
        .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    // ─── MESSAGE HELPERS ─────────────────────────────────────────────────────────
    function appendMessage(role, text) {
      const wrap = document.createElement('div');
      wrap.className = `msg msg-${role}`;

      const label = document.createElement('div');
      label.className = 'msg-label';
      label.textContent = role === 'user' ? 'You' : 'AI Tutor';

      const bubble = document.createElement('div');
      bubble.className = 'msg-bubble';

      if (role === 'ai') {
        bubble.innerHTML = renderMarkdown(text);
        if (window._katexReady) applyMath(bubble);
        else pendingMathEls.push(bubble);
      } else {
        bubble.textContent = text;
      }

      wrap.appendChild(label);
      wrap.appendChild(bubble);
      feed.appendChild(wrap);
      feed.scrollTo({ top: feed.scrollHeight, behavior: 'smooth' });
      return wrap;
    }

    function appendDivider(label) {
      const div = document.createElement('div');
      div.className = 'session-divider';
      div.textContent = label;
      feed.appendChild(div);
    }

    function appendTypingIndicator() {
      const wrap = document.createElement('div');
      wrap.className = 'msg msg-ai';
      wrap.id = 'typing-indicator';
      const label = document.createElement('div');
      label.className = 'msg-label';
      label.textContent = 'AI Tutor';
      const bubble = document.createElement('div');
      bubble.className = 'msg-bubble thinking';
      bubble.innerHTML = '<div class="typing-dots"><span></span><span></span><span></span></div>';
      wrap.appendChild(label);
      wrap.appendChild(bubble);
      feed.appendChild(wrap);
      feed.scrollTo({ top: feed.scrollHeight, behavior: 'smooth' });
    }

    function removeTypingIndicator() {
      const el = document.getElementById('typing-indicator');
      if (el) el.remove();
    }

    // ─── STREAMING ───────────────────────────────────────────────────────────────
    async function streamMessage(userContent) {
      conversationMessages.push({ role: 'user', content: userContent });
      isStreaming = true;
      sendBtn.disabled = true;
      input.disabled = true;

      removeTypingIndicator();

      const wrap = document.createElement('div');
      wrap.className = 'msg msg-ai';
      const lbl = document.createElement('div');
      lbl.className = 'msg-label';
      lbl.textContent = 'AI Tutor';
      const bubble = document.createElement('div');
      bubble.className = 'msg-bubble';
      bubble.innerHTML = '<div class="typing-dots"><span></span><span></span><span></span></div>';
      wrap.appendChild(lbl);
      wrap.appendChild(bubble);
      feed.appendChild(wrap);
      feed.scrollTo({ top: feed.scrollHeight, behavior: 'smooth' });

      let fullText = '';
      let firstChunk = true;

      try {
        const groqKey = localStorage.getItem('studyxp.groq_api_key');
        const reqHeaders = { 'Content-Type': 'application/json' };
        if (groqKey) reqHeaders['X-Groq-Api-Key'] = groqKey;
        const res = await fetch('/api/teach/stream', {
          method: 'POST',
          headers: reqHeaders,
          body: JSON.stringify({ domain, unitIds, messages: conversationMessages })
        });

        if (!res.ok) {
          const err = await res.json().catch(() => ({ error: 'Request failed' }));
          throw new Error(err.error || `HTTP ${res.status}`);
        }

        const reader = res.body.getReader();
        const decoder = new TextDecoder();
        let buffer = '';

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          buffer += decoder.decode(value, { stream: true });
          const lines = buffer.split('\n');
          buffer = lines.pop();

          for (const line of lines) {
            if (!line.startsWith('data: ')) continue;
            const payload = line.slice(6).trim();
            if (payload === '[DONE]') break;
            try {
              const chunk = JSON.parse(payload);
              if (chunk && typeof chunk === 'object' && chunk.error) throw new Error(chunk.error);
              if (typeof chunk === 'string') {
                if (firstChunk) { bubble.textContent = ''; firstChunk = false; }
                fullText += chunk;
                bubble.textContent = fullText;
                feed.scrollTo({ top: feed.scrollHeight, behavior: 'smooth' });
              }
            } catch (e) {
              if (e.message.startsWith('HTTP ') || e.message !== 'Unexpected token') throw e;
            }
          }
        }

        bubble.innerHTML = renderMarkdown(fullText || '(no response)');
        if (window._katexReady) applyMath(bubble);
        else pendingMathEls.push(bubble);

        conversationMessages.push({ role: 'assistant', content: fullText });

      } catch (err) {
        bubble.innerHTML = `<strong>Error:</strong> ${escapeHtml(err.message)}`;
      } finally {
        isStreaming = false;
        sendBtn.disabled = false;
        input.disabled = false;
        feed.scrollTo({ top: feed.scrollHeight, behavior: 'smooth' });
      }
    }

    // ─── SEND MESSAGE ─────────────────────────────────────────────────────────────
    async function sendMessage() {
      if (isStreaming) return;
      const text = input.value.trim();
      if (!text) return;
      if (!domain || !unitIds.length) {
        alert('No subject context loaded. Go back and use the test page to open Teach mode.');
        return;
      }
      input.value = '';
      input.style.height = 'auto';
      appendMessage('user', text);
      appendTypingIndicator();
      await streamMessage(text);
    }

    // ─── BUILD AUTO-EXPLAIN MESSAGE ───────────────────────────────────────────────
    function buildAutoExplainMessage(ctx) {
      const { questions, answers, results } = ctx;
      if (!questions || !answers) return null;

      const lines = [
        'Please review my test answers below. For each question, explain the correct approach and where my answer fell short. Be thorough but clear.',
        ''
      ];

      questions.forEach(q => {
        const ans = answers.find(a => a.id === q.id);
        const res = results ? results.find(r => r.id === q.id) : null;

        lines.push(`---`);
        lines.push(`**Question ${q.id}:** ${q.question}`);
        lines.push(`**My answer:** ${ans?.answer || '(no answer)'}`);
        if (res) {
          lines.push(`**Result:** ${res.state}`);
          if (res.feedback) lines.push(`**Feedback:** ${res.feedback}`);
          if (res.exampleAnswer) lines.push(`**Model answer:** ${res.exampleAnswer}`);
        }
        lines.push('');
      });

      return lines.join('\n');
    }

    // ─── INIT ────────────────────────────────────────────────────────────────────
    window.addEventListener('DOMContentLoaded', async () => {
      const raw = sessionStorage.getItem('teachContext');
      if (raw) {
        try {
          const ctx = JSON.parse(raw);
          domain = ctx.domain || null;
          unitIds = Array.isArray(ctx.unitIds) ? ctx.unitIds : [];
          sessionStorage.removeItem('teachContext');

          feed.innerHTML = '';
          appendDivider('Teach Session — ' + (domain || 'Unknown Domain'));

          const autoMsg = buildAutoExplainMessage(ctx);
          if (autoMsg) {
            const hasResults = ctx.results && ctx.results.length > 0;
            const displayMsg = hasResults
              ? 'Explain my test results and help me understand where I went wrong.'
              : 'Review my answers and explain the concepts clearly.';
            appendMessage('user', displayMsg);
            appendTypingIndicator();
            await streamMessage(autoMsg);
          }
          return;
        } catch (_) {}
      }

      // No context: try to get a domain so free chat works
      try {
        const domains = await fetch('/api/domains').then(r => r.json());
        if (domains && domains.length > 0) {
          domain = domains[0];
          const unitsData = await fetch(`/api/units/${domain}`).then(r => r.json());
          unitIds = [];
          for (const bt of (unitsData.tree || [])) {
            for (const cl of (bt.clusters || [])) {
              for (const u of (cl.units || [])) unitIds.push(u.id);
            }
          }
        }
      } catch (_) {}

      // Show demo messages as examples
      appendDivider('Demo — Example Conversation');
      appendMessage('user', 'Can you explain what a derivative is?');
      appendMessage('ai', `## What Is a Derivative?

A **derivative** tells you how fast something is changing at an exact instant — the *instantaneous rate of change*.

Think of driving: your position is $s(t)$. Your speed at any moment is the derivative of position.

### Definition

$$\\frac{df}{dx} = \\lim_{h \\to 0} \\frac{f(x+h) - f(x)}{h}$$

Nudge $x$ by a tiny amount $h$. The derivative is the ratio of the output change to the input change, as $h$ shrinks to zero.

### Example

For $f(x) = x^2$, applying the definition gives $f'(x) = 2x$.

So at $x = 3$, the function is increasing at a rate of $6$.

> The derivative at a point equals the **slope of the tangent line** to the curve there.`);
      appendDivider('Start Chatting Below');
    });

    // Send on button click
    sendBtn.addEventListener('click', sendMessage);

    // Send on Enter (Shift+Enter = newline)
    input.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    // Auto-resize textarea
    input.addEventListener('input', () => {
      input.style.height = 'auto';
      input.style.height = Math.min(input.scrollHeight, 120) + 'px';
    });
  </script>

</body>
</html>
